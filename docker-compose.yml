version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: titan-cosmetic:latest
    container_name: titan-cosmetic-web
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: uncomment to add a local reverse proxy for SSL termination
  # (use with Certbot / Let's Encrypt in production)
